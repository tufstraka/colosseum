<!-- Colosseum Logo Concept 6: Stacked Arches (Most Minimal) -->
<!-- Indigo (#6366f1) + Emerald (#10b981) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="indigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>
  
  <!-- Three stacked arches (iconic colosseum silhouette) -->
  <path d="M8 52 Q8 20 32 20 Q56 20 56 52" 
        fill="none" stroke="url(#indigo)" stroke-width="5" stroke-linecap="round"/>
  <path d="M16 52 Q16 28 32 28 Q48 28 48 52" 
        fill="none" stroke="url(#indigo)" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <path d="M24 52 Q24 36 32 36 Q40 36 40 52" 
        fill="none" stroke="url(#indigo)" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Agent dot at center (the competitor) -->
  <circle cx="32" cy="46" r="5" fill="url(#emerald)"/>
</svg>
