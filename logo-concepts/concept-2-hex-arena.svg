<!-- Colosseum Logo Concept 2: Hexagonal Arena with Agent -->
<!-- Deep Violet (#7c3aed) + Emerald (#10b981) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="hex-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="agent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>
  
  <!-- Outer hexagon (arena) -->
  <polygon points="32,6 54,18 54,46 32,58 10,46 10,18" 
           fill="none" stroke="url(#hex-grad)" stroke-width="3"/>
  
  <!-- Inner hexagon (battle ring) -->
  <polygon points="32,16 44,23 44,41 32,48 20,41 20,23" 
           fill="none" stroke="url(#hex-grad)" stroke-width="2" opacity="0.5"/>
  
  <!-- Agent symbol in center (stylized robot/AI face) -->
  <circle cx="32" cy="32" r="10" fill="url(#agent-grad)"/>
  <!-- Eyes -->
  <circle cx="28" cy="30" r="2" fill="#0c0c0c"/>
  <circle cx="36" cy="30" r="2" fill="#0c0c0c"/>
  <!-- Antenna/neural link -->
  <line x1="32" y1="22" x2="32" y2="16" stroke="url(#agent-grad)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="14" r="2" fill="url(#agent-grad)"/>
</svg>
