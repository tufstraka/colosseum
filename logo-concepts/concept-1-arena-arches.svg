<!-- Colosseum Logo Concept 1: Arena Arches + Agent Node -->
<!-- Electric Indigo (#6366f1) + Cyan accent (#0ea5e9) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="arena-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="node-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
  </defs>
  
  <!-- Arena arches (3 nested) forming abstract colosseum -->
  <path d="M12 44 Q12 20 32 20 Q52 20 52 44" 
        fill="none" stroke="url(#arena-grad-1)" stroke-width="4" stroke-linecap="round"/>
  <path d="M18 44 Q18 26 32 26 Q46 26 46 44" 
        fill="none" stroke="url(#arena-grad-1)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M24 44 Q24 32 32 32 Q40 32 40 44" 
        fill="none" stroke="url(#arena-grad-1)" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Central agent node (the competitor in the arena) -->
  <circle cx="32" cy="42" r="8" fill="url(#node-grad-1)"/>
  <circle cx="32" cy="42" r="4" fill="#0c0c0c"/>
  
  <!-- Base line -->
  <line x1="8" y1="48" x2="56" y2="48" stroke="url(#arena-grad-1)" stroke-width="3" stroke-linecap="round"/>
</svg>
