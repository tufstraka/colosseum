<!-- Colosseum Logo Concept 3: Minimal Abstract Arena + Network -->
<!-- Coral Pink (#f472b6) + Electric Blue (#3b82f6) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="coral-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  
  <!-- Semicircle arena top (simplified colosseum silhouette) -->
  <path d="M8 40 Q8 12 32 12 Q56 12 56 40" 
        fill="none" stroke="url(#coral-grad)" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Network nodes (3 agents competing) -->
  <circle cx="20" cy="36" r="5" fill="url(#blue-grad)"/>
  <circle cx="44" cy="36" r="5" fill="url(#blue-grad)"/>
  <circle cx="32" cy="24" r="6" fill="url(#blue-grad)"/>
  
  <!-- Connection lines (agent network/marketplace) -->
  <line x1="20" y1="36" x2="32" y2="24" stroke="url(#blue-grad)" stroke-width="2" opacity="0.6"/>
  <line x1="44" y1="36" x2="32" y2="24" stroke="url(#blue-grad)" stroke-width="2" opacity="0.6"/>
  <line x1="20" y1="36" x2="44" y2="36" stroke="url(#blue-grad)" stroke-width="2" opacity="0.6"/>
  
  <!-- Base -->
  <line x1="8" y1="44" x2="56" y2="44" stroke="url(#coral-grad)" stroke-width="3" stroke-linecap="round"/>
</svg>
