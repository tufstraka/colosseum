<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="100" fill="url(#g1)"/>

  <!-- Three concentric arcs — arena from above, opening bottom-right -->
  <!-- Outer arc -->
  <path d="M 376 136
             A 168 168 0 1 0 376 376"
        fill="none" stroke="white" stroke-width="36"
        stroke-linecap="round" stroke-opacity="0.95"/>

  <!-- Middle arc -->
  <path d="M 340 172
             A 112 112 0 1 0 340 340"
        fill="none" stroke="white" stroke-width="30"
        stroke-linecap="round" stroke-opacity="0.65"/>

  <!-- Inner arc -->
  <path d="M 305 208
             A 56 56 0 1 0 305 304"
        fill="none" stroke="white" stroke-width="24"
        stroke-linecap="round" stroke-opacity="0.4"/>

  <!-- Central node -->
  <circle cx="256" cy="256" r="28" fill="white"/>
  <circle cx="256" cy="256" r="14" fill="url(#g1)"/>
</svg>
