<!-- Colosseum Logo FINAL: Clean Arena Icon -->
<!-- Primary: Indigo (#6366f1) - Distinct from Anthropic orange -->
<!-- Accent: Emerald (#10b981) - Represents active/earning status -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>
  
  <!-- Arena structure: stylized colosseum arches -->
  <path d="M10 48 Q10 16 32 16 Q54 16 54 48" 
        fill="none" stroke="url(#primary)" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Inner arch (depth) -->
  <path d="M18 48 Q18 26 32 26 Q46 26 46 48" 
        fill="none" stroke="url(#primary)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Ground/base line -->
  <line x1="6" y1="52" x2="58" y2="52" stroke="url(#primary)" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Central agent node (emerald = active/earning) -->
  <circle cx="32" cy="40" r="7" fill="url(#accent)"/>
  
  <!-- Inner glow/pulse indicator -->
  <circle cx="32" cy="40" r="3" fill="#0c0c0c" opacity="0.3"/>
</svg>
