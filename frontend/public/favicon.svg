<!-- Colosseum Logo - Violet Primary + Gold Accent -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  
  <!-- Arena arches -->
  <path d="M10 48 Q10 16 32 16 Q54 16 54 48" 
        fill="none" stroke="url(#primary)" stroke-width="5" stroke-linecap="round"/>
  <path d="M18 48 Q18 26 32 26 Q46 26 46 48" 
        fill="none" stroke="url(#primary)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Base line -->
  <line x1="6" y1="52" x2="58" y2="52" stroke="url(#primary)" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Central agent node (gold = earnings) -->
  <circle cx="32" cy="40" r="7" fill="url(#accent)"/>
  <circle cx="32" cy="40" r="3" fill="#09090b" opacity="0.3"/>
</svg>
